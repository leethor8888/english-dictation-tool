<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英语单词听写工具</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">本地版</p>
          <h1 id="pageTitle">英语单词听写工具</h1>
        </div>
        <nav class="top-actions" aria-label="页面导航">
          <button class="ghost-button" data-view-button="home" type="button">首页</button>
          <button class="ghost-button" data-view-button="settings" type="button">设置</button>
        </nav>
      </header>

      <main>
        <section id="homeView" class="view active" aria-labelledby="homeTitle">
          <div class="layout-grid">
            <section class="panel import-panel">
              <div class="section-head">
                <div>
                  <h2 id="homeTitle">导入单词本</h2>
                  <p>支持每行一个单词、英文加中文释义、TXT 和 CSV。</p>
                </div>
              </div>
              <textarea id="importText" class="large-textarea" placeholder="apple 苹果&#10;banana 香蕉&#10;orange 橙子"></textarea>
              <div class="file-row">
                <label class="file-picker">
                  <span>选择 TXT / CSV 文件</span>
                  <input id="fileInput" type="file" accept=".txt,.csv,text/plain,text/csv" />
                </label>
                <span id="fileName" class="file-name">未选择文件</span>
              </div>
              <div class="button-row">
                <button id="importButton" class="primary-button" type="button">导入单词</button>
                <button id="startButton" class="success-button" type="button">开始听写</button>
              </div>
              <p id="importMessage" class="message" role="status"></p>
            </section>

            <section class="panel">
              <div class="section-head">
                <div>
                  <h2>当前单词本</h2>
                  <p><span id="wordCount">0</span> 个单词，刷新后仍会保留。</p>
                </div>
                <button id="clearWordsButton" class="danger-link" type="button">清空</button>
              </div>
              <div id="wordList" class="word-list empty-state">还没有导入单词。</div>
            </section>
          </div>

          <div class="layout-grid secondary-grid">
            <section class="panel">
              <div class="section-head">
                <div>
                  <h2>最近成绩</h2>
                  <p>显示最近 10 次听写记录。</p>
                </div>
                <button id="clearHistoryButton" class="danger-link" type="button">清空</button>
              </div>
              <div id="historyList" class="history-list empty-state">暂无成绩记录。</div>
            </section>

            <section class="panel tips-panel">
              <h2>使用提示</h2>
              <p>导入单词后点击开始听写。听写时不会显示英文单词，可以反复点击听音。</p>
              <p id="speechSupportMessage" class="message"></p>
            </section>
          </div>
        </section>

        <section id="practiceView" class="view" aria-labelledby="practiceTitle">
          <section class="practice-card">
            <div class="practice-top">
              <div>
                <h2 id="practiceTitle">听写中</h2>
                <p id="practiceModeText">全部单词</p>
              </div>
              <button id="exitPracticeButton" class="ghost-button" type="button">退出本次听写</button>
            </div>

            <div class="progress-wrap" aria-label="听写进度">
              <div class="progress-label">
                <span id="progressText">第 0 / 0 个</span>
                <span id="timerText">00:00</span>
              </div>
              <div class="progress-track">
                <div id="progressBar" class="progress-bar"></div>
              </div>
            </div>

            <div class="listen-zone">
              <button id="speakButton" class="listen-button" type="button">听音</button>
              <span id="speakStatus" class="speak-status" aria-live="polite"></span>
            </div>

            <form id="answerForm" class="answer-form">
              <label for="answerInput">输入你听到的单词</label>
              <input id="answerInput" type="text" autocomplete="off" spellcheck="false" />
              <div class="button-row">
                <button class="primary-button" type="submit">提交</button>
                <button id="skipButton" class="ghost-button" type="button">跳过</button>
              </div>
            </form>

            <div id="feedbackBox" class="feedback hidden" aria-live="polite"></div>
          </section>
        </section>

        <section id="resultView" class="view" aria-labelledby="resultTitle">
          <section class="panel result-panel">
            <div class="section-head">
              <div>
                <h2 id="resultTitle">听写结果</h2>
                <p id="masteryMessage"></p>
              </div>
            </div>
            <div class="stats-grid">
              <div class="stat-card"><span>总单词数</span><strong id="totalStat">0</strong></div>
              <div class="stat-card"><span>正确数量</span><strong id="correctStat">0</strong></div>
              <div class="stat-card"><span>错误数量</span><strong id="wrongStat">0</strong></div>
              <div class="stat-card"><span>正确率</span><strong id="rateStat">0%</strong></div>
              <div class="stat-card"><span>本次用时</span><strong id="durationStat">00:00</strong></div>
            </div>
            <div class="button-row result-actions">
              <button id="retryAllButton" class="primary-button" type="button">重新听写全部单词</button>
              <button id="retryWrongButton" class="success-button" type="button">只听写错题</button>
              <button id="exportWrongButton" class="ghost-button" type="button">导出错题</button>
              <button id="backHomeButton" class="ghost-button" type="button">返回首页</button>
            </div>
          </section>

          <section class="panel">
            <h2>本次错题</h2>
            <div id="resultWrongList" class="wrong-list empty-state">本次没有错题。</div>
          </section>
        </section>

        <section id="settingsView" class="view" aria-labelledby="settingsTitle">
          <section class="panel settings-panel">
            <div class="section-head">
              <div>
                <h2 id="settingsTitle">设置</h2>
                <p>设置会自动保存在本机浏览器。</p>
              </div>
            </div>

            <div class="settings-grid">
              <label class="setting-item">
                <span>发音语言</span>
                <select id="voiceLang">
                  <option value="en-US">en-US 美式英语</option>
                  <option value="en-GB">en-GB 英式英语</option>
                </select>
              </label>

              <label class="setting-item">
                <span>语速</span>
                <select id="speechRate">
                  <option value="0.75">慢速</option>
                  <option value="1">正常</option>
                  <option value="1.2">快速</option>
                </select>
              </label>

              <label class="toggle-item">
                <span>进入下一个单词时自动播放</span>
                <input id="autoSpeak" type="checkbox" />
              </label>

              <label class="toggle-item">
                <span>随机顺序听写</span>
                <input id="shuffleWords" type="checkbox" />
              </label>
            </div>
          </section>
        </section>
      </main>

      <footer class="footer-note">
        数据保存在本机浏览器，清理浏览器数据可能会丢失单词本。
      </footer>
    </div>

    <script src="./src/app.js" type="module"></script>
  </body>
</html>
